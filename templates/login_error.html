<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign-in Error — Proxima</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: #fff; border-radius: 10px; padding: 40px; max-width: 420px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .logo { width: 52px; height: 52px; border-radius: 50%; margin-bottom: 20px; }
    h1 { font-family: 'Montserrat', sans-serif; color: #05718D; font-size: 20px; margin-bottom: 10px; }
    p { color: #6b7280; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    .error-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: 12px 16px; font-size: 13px; color: #dc2626; margin-bottom: 24px; text-align: left; word-break: break-word; }
    a { display: inline-block; padding: 10px 28px; background: #05718D; color: #fff; border-radius: 20px; text-decoration: none; font-size: 14px; font-weight: 600; }
    a:hover { background: #045f77; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/static/logo.png" alt="Proxima" class="logo" />
    <h1>Sign-in failed</h1>
    <p>There was a problem authenticating your Microsoft 365 account.</p>
    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}
    <a href="/login">Try again</a>
  </div>
</body>
</html>
